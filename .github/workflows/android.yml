name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Flutter Setup (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          # Usamos la 3.22.0 porque permite el truco de compatibilidad
          flutter-version: '3.22.0' 
          channel: 'stable'

      - name: 4. Build APK (Forzado)
        run: |
          # Limpiamos rastro de versiones viejas
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando que la libreria sea vieja
          # El flag --no-sound-null-safety es el secreto aqui
          flutter pub get || true
          
          # FABRICAMOS EL APK: Este comando unira Alchemy con las librerias viejas
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
