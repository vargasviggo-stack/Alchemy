name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion de Alchemy
        run: |
          # Aceptamos licencias
          yes | sdkmanager --licenses || true
          
          # Borramos el rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora GitHub usará tu pubspec real)
          flutter pub get
          
          # Construimos el APK de Alchemy
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
