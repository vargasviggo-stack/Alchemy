name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version Dart 3.7.0)
        uses: subosito/flutter-action@v2
        with:
          # Esta version es la que subira tu Dart de 3.6 a 3.7
          flutter-version: '3.27.0' 
          channel: 'stable'
          cache: false # Forzamos descarga limpia

      - name: 4. Construccion de Alchemy
        run: |
          # Aceptamos licencias
          yes | sdkmanager --licenses || true
          
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Ahora con Dart 3.7 dara VERDE
          flutter pub get
          
          # Fabricamos el APK
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
