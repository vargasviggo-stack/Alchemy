name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # He subido la versión a la 3.19.0 porque Alchemy se actualizó recientemente
          flutter-version: '3.19.0' 
          channel: 'stable'
          cache: true

      - name: Limpiar y Obtener Dependencias
        run: |
          # Forzamos la regeneración del archivo de bloqueo para evitar conflictos
          rm -f pubspec.lock
          flutter clean
          flutter pub get

      - name: Build APK
        # Añadimos --split-per-abi por si la arquitectura de destino es específica
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-APK
          path: build/app/outputs/flutter-apk/app-release.apk
