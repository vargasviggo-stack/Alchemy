name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          # Usamos 'any' para tener Dart 3.8+ que pide el error de tu foto
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion de Compatibilidad
        run: |
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando conflictos de Null Safety
          # El flag --no-sound-null-safety es el que une ambos mundos
          flutter pub get
          
          # Fabricamos el APK permitiendo la mezcla de versiones
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
