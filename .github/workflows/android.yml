name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Usamos 'any' para que baje la versión con Dart 3.8+ que pide Alchemy
          flutter-version: 'any' 
          channel: 'stable'
          cache: true

      - name: Build APK Final
        run: |
          # Borramos el rastro de las carpetas locales (los path: que quitaste)
          rm -f pubspec.lock
          flutter clean
          # Descargamos todo de internet
          flutter pub get
          # Construimos el APK de Alchemy
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-APK
          path: build/app/outputs/flutter-apk/app-release.apk
