name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Reparar y Construir APK
        run: |
          # Limpiamos rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # TRUCO: Forzamos el uso de una version de custom_navigator que SI tiene Null Safety
          # Esto evita que tengas que editar el pubspec.yaml a mano y fallar con los espacios.
          sed -i 's/custom_navigator: any/custom_navigator: {git: {url: "https:\/\/github.com\/m-hamzashakeel\/custom_navigator.git"}}/g' pubspec.yaml
          
          # Descargamos todo y fabricamos el APK
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
