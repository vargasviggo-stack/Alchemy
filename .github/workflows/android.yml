name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Canal Beta para Dart 3.7)
        uses: subosito/flutter-action@v2
        with:
          # El canal beta ya tiene el Dart 3.7.0 que la version estable aun no suelta
          channel: 'beta'
          cache: false # OBLIGATORIO: Para que no use la 3.6.0 vieja

      - name: 4. Construccion de Alchemy
        run: |
          # Limpieza profunda de memoria
          rm -f pubspec.lock
          flutter clean
          
          # Con el canal Beta, el Dart sera 3.7.x y dara VERDE por fin
          flutter pub get
          
          # Fabricamos el APK
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
