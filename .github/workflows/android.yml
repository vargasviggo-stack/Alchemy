name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version de Oro)
        uses: subosito/flutter-action@v2
        with:
          # Usamos la 3.19.6 porque es la que mejor perdona a las librerias viejas
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: 4. Construccion de Alchemy
        run: |
          # Aceptamos licencias de Google
          yes | sdkmanager --licenses || true
          
          # Borramos el rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora sin lints dara VERDE)
          flutter pub get || true
          
          # FABRICAMOS EL APK: El flag --no-sound-null-safety arregla lo de custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
