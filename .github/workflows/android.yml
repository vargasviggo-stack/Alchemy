name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          # Esta version trae Dart 3.5.0 que pide tu error de la linea 51
          flutter-version: '3.24.0' 
          channel: 'stable'

      - name: 4. Build APK Final
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora con Dart 3.5 dara VERDE)
          flutter pub get
          
          # Construimos el APK sin el comando "no-sound-null-safety" que daba error
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Guardar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
