name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version Dart 3.5+)
        uses: subosito/flutter-action@v2
        with:
          # Usamos la 3.24.0 para cumplir con el SDK >=3.5.0 de tu error
          flutter-version: '3.24.0' 
          channel: 'stable'
          cache: true

      - name: 4. Construccion de Compatibilidad
        run: |
          # Limpieza total
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora con Dart 3.5+ dara VERDE)
          flutter pub get
          
          # Fabricamos el APK permitiendo la mezcla con custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Guardar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
