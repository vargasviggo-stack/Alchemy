name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version estable 2026)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Cirugia y Construccion
        run: |
          # A) ELIMINAMOS la libreria que daba guerra (custom_navigator)
          sed -i '/custom_navigator:/d' pubspec.yaml
          
          # B) Arreglamos el SDK (Sin comillas para que Flutter lo entienda)
          sed -i "s/sdk: .*/sdk: '>=2.12.0 <4.0.0'/" pubspec.yaml
          
          # C) Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # D) Descargamos librerias (Ahora dara VERDE)
          flutter pub get
          
          # E) Fabricamos el APK
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
