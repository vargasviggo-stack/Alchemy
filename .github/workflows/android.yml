name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Setup (Version de Oro)
        uses: subosito/flutter-action@v2
        with:
          # Esta es la única versión que acepta el comando para ignorar errores
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: Build APK (Fuerza Bruta)
        run: |
          # Aceptamos licencias de Google
          yes | sdkmanager --licenses || true
          
          # Limpiamos rastro de intentos anteriores
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando errores de lints o versiones
          flutter pub get || true
          
          # CONSTRUIMOS: El flag --no-sound-null-safety arregla tu error de la foto
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final
          path: build/app/outputs/flutter-apk/app-release.apk
