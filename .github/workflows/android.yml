name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version mas nueva)
        uses: subosito/flutter-action@v2
        with:
          # Ponemos 'any' para que GitHub busque la version mas moderna de 2026.
          # Esto actualizara el Dart de 3.3.4 a 3.5.0 o superior.
          flutter-version: 'any' 
          channel: 'stable'
          # Desactivamos el cache temporalmente para forzar la descarga nueva
          cache: false 

      - name: 4. Construccion Forzada
        run: |
          # Limpiamos todo rastro de la version 3.3.4
          rm -f pubspec.lock
          flutter clean
          
          # Ahora con Dart 3.5+ esto deberia dar VERDE
          flutter pub get
          
          # Fabricamos el APK ignorando el error de Null Safety
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
