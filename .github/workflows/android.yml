name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version Dart 3.7.0)
        uses: subosito/flutter-action@v2
        with:
          # Usamos la 3.30.0 para subir de 3.6 a 3.7 de una vez
          flutter-version: '3.30.0' 
          channel: 'stable'
          cache: false # Forzamos descarga limpia para que GitHub se actualice

      - name: 4. Construccion de Alchemy
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Ahora con Dart 3.7 esto dara VERDE
          flutter pub get
          
          # Fabricamos el APK
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
