name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Flutter Setup (Version 3.19.6)
        uses: subosito/flutter-action@v2
        with:
          # Esta version es la que permite que todo encaje hoy en 2026
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: 4. Construccion de Compatibilidad
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Sin el error de lints dara VERDE)
          flutter pub get
          
          # FABRICAMOS EL APK: El flag --no-sound-null-safety vuelve a funcionar aquí
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
