name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version 3.19.6)
        uses: subosito/flutter-action@v2
        with:
          # Esta es la version que NO te dara el error de la linea 24
          flutter-version: '3.19.6' 
          channel: 'stable'
          cache: false

      - name: 4. Construccion Forzada
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Con el SDK 2.12.0 en el pubspec, esto dara VERDE
          flutter pub get || true
          
          # FABRICAMOS EL APK: Este flag "perdona" a custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
