name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          # Ponemos 'any' para que baje la version mas nueva (estable)
          # Esto garantiza que use Dart 3.8.0 o superior como pide el error.
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion del APK
        run: |
          # Limpiamos rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # Ahora con Dart 3.8+ el 'pub get' se pondra en VERDE
          flutter pub get
          
          # Construimos el APK de Alchemy
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
