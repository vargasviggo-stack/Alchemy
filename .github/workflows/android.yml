name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version Dart 3.5.0)
        uses: subosito/flutter-action@v2
        with:
          # Esta version trae Dart 3.5.0 que pide tu error de sqflite
          flutter-version: '3.24.0' 
          channel: 'stable'

      - name: 4. Construccion de Alchemy
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora con Dart 3.5 dara VERDE)
          flutter pub get
          
          # FABRICAMOS EL APK: Quitamos el flag que ya no existe en 2026
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Guardar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
