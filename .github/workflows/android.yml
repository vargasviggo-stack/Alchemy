name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion Forzada (Ignorar Null Safety)
        run: |
          # Limpieza total
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando que la libreria sea vieja
          flutter pub get --no-example
          
          # FABRICAMOS EL APK: El flag --no-sound-null-safety es el que 
          # quita el error de tu ultima imagen por completo.
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
