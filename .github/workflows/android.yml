name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # "any" con canal stable descargará la versión más moderna disponible
          # que es lo que Alchemy necesita para el SDK de Dart.
          flutter-version: 'any' 
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          rm -f pubspec.lock
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-APK
          path: build/app/outputs/flutter-apk/app-release.apk
