name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Limpieza Total)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'
          # ESTO ES VITAL: Obliga a GitHub a no usar la memoria vieja
          cache: false 

      - name: 4. Construccion Forzada
        run: |
          # Borramos CUALQUIER rastro de errores pasados
          rm -rf pubspec.lock
          flutter clean
          
          # Ahora GitHub usará tu SDK 2.12.0 y se pondrá en VERDE
          flutter pub get
          
          # FABRICAMOS EL APK: El flag ignora a custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
