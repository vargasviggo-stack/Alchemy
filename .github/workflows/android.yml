name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Limpio 2026)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'
          cache: false 

      - name: 4. Cirugía y Construcción
        run: |
          # FORZAMOS el cambio a 2.12.0 directamente en el archivo
          # Esto mata el error de tu imagen (línea 20) de una vez por todas.
          sed -i "s/sdk: .*/sdk: '>=2.12.0 <4.0.0'/" pubspec.yaml
          
          # Verificamos que el cambio se hizo (lo verás en el log)
          grep "sdk:" pubspec.yaml
          
          # Limpieza total de rastro
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos todo (Ahora dará VERDE)
          flutter pub get
          
          # FABRICAMOS EL APK: Ignoramos el error de custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
