name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Canal Master para Dart 3.7)
        uses: subosito/flutter-action@v2
        with:
          # Usamos 'master' para forzar la version mas nueva de 2026
          channel: 'master'
          cache: false 

      - name: 4. Construccion de Alchemy
        run: |
          # Aceptamos licencias
          yes | sdkmanager --licenses || true
          
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Con el canal master, el Dart sera 3.7+ y dara VERDE
          flutter pub get
          
          # Fabricamos el APK
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
