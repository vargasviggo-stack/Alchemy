name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Forzar descarga limpia)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'
          # DESACTIVAMOS EL CACHE: Esto obliga a GitHub a leer tu 2.12.0 nuevo
          cache: false 

      - name: 4. Construccion Forzada
        run: |
          # Limpiamos rastro de errores pasados de forma agresiva
          rm -f pubspec.lock
          flutter clean
          
          # Ahora GitHub usará tu SDK 2.12.0 y dara VERDE
          flutter pub get
          
          # FABRICAMOS EL APK: Ignoramos el error de custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
