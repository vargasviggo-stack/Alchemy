name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version Compatible)
        uses: subosito/flutter-action@v2
        with:
          # Usamos la 3.10.0 porque permite librerias sin Null Safety
          flutter-version: '3.10.0' 
          channel: 'stable'

      - name: 4. Construccion Forzada
        run: |
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Bajamos las librerias ignorando advertencias
          flutter pub get
          
          # Fabricamos el APK permitiendo librerias antiguas
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
