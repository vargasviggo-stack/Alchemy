name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Usamos la versión estable actual de 2026 para tener Dart 3.8+
          flutter-version: '3.33.0' 
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          # Eliminamos el lock viejo para que no choque con el nuevo SDK
          rm -f pubspec.lock
          flutter clean
          flutter pub get

      - name: Build APK
        # Agregamos flags para evitar errores comunes de iconos y permisos
        run: flutter build apk --release --no-tree-shake-icons --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-APK-2026
          path: build/app/outputs/flutter-apk/app-release.apk
