name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Flutter Setup (Version 3.22.0)
        uses: subosito/flutter-action@v2
        with:
          # Esta version tiene el Dart que pide lints y el comando para custom_navigator
          flutter-version: '3.22.0' 
          channel: 'stable'
          cache: false # Forzamos la descarga limpia

      - name: 4. Construccion de Compatibilidad Total
        run: |
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora con Dart moderno dara VERDE)
          flutter pub get
          
          # FABRICAMOS EL APK: En la 3.22.0 este flag SI existe y funcionara
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
