name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version de Oro 3.19.6)
        uses: subosito/flutter-action@v2
        with:
          # Usamos esta porque es la única que permite el truco de compatibilidad
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: 4. Cirugía y Construcción Final
        run: |
          # Aceptamos licencias
          yes | sdkmanager --licenses || true
          
          # ELIMINAMOS el problema: Borramos cualquier rastro de lints del archivo
          # Esto hará que el error de tu imagen desaparezca POR FIN.
          sed -i '/flutter_lints:/d' pubspec.yaml
          
          # Ajustamos el SDK para que no se queje de la versión
          sed -i 's/sdk: .*/sdk: ">=3.0.0 <4.0.0"/' pubspec.yaml
          
          # Limpieza total
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos todo (Ahora dará VERDE porque ya no existe flutter_lints)
          flutter pub get || true
          
          # FABRICAMOS EL APK: El flag --no-sound-null-safety arregla lo de custom_navigator
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
