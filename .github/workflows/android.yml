name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version mas nueva)
        uses: subosito/flutter-action@v2
        with:
          # Usamos 'any' para tener el Dart 3.12 que ya tienes funcionando
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion Forzada
        run: |
          # Aceptamos licencias de Google
          yes | sdkmanager --licenses || true
          
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Ahora con el SDK 2.12.0 en el pubspec, esto dara VERDE
          flutter pub get
          
          # FABRICAMOS EL APK: Ignoramos el error de Null Safety con este flag
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
