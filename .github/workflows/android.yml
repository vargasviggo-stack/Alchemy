name: Build Alchemy APK Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version 2026)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion Forzada
        run: |
          # Limpiamos rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando el error de Null Safety
          # El flag --no-sound-null-safety aqui es VITAL
          flutter pub get || true
          
          # FABRICAMOS EL APK: Este comando es el que saltara el error de tu foto
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
