name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter (Version 3.19.6)
        uses: subosito/flutter-action@v2
        with:
          # Esta versión es el equilibrio perfecto para este proyecto en 2026
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: 4. Construccion de Compatibilidad Total
        run: |
          # Limpiamos rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías ignorando conflictos de Null Safety
          # El flag --no-sound-null-safety es VITAL aquí
          flutter pub get || true
          
          # FABRICAMOS EL APK: Este comando unirá ambos mundos
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
