name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version de Oro)
        uses: subosito/flutter-action@v2
        with:
          # Esta version es el equilibrio perfecto para este proyecto
          flutter-version: '3.19.6' 
          channel: 'stable'

      - name: 4. Construccion de Compatibilidad Total
        run: |
          # Limpiamos rastro de errores pasados
          rm -f pubspec.lock
          flutter clean
          
          # FORZAMOS la descarga ignorando el error de Null Safety de tu foto
          # Usamos un comando especial para que no se detenga en las dependencias
          flutter pub get --no-example
          
          # FABRICAMOS EL APK: Este comando unira Alchemy con las librerias viejas
          # El flag --no-sound-null-safety es el que hace la magia aqui
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Guardar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
