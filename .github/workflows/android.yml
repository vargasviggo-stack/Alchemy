name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter (Version mas nueva)
        uses: subosito/flutter-action@v2
        with:
          # Usamos 'any' para que baje la version que tiene Dart 3.8+
          flutter-version: 'any' 
          channel: 'stable'
          cache: true

      - name: 4. Construccion Forzada del APK
        run: |
          # Aceptamos licencias de Android
          yes | sdkmanager --licenses || true
          
          # Limpieza profunda
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías (Ahora con la version mas nueva dara VERDE)
          flutter pub get
          
          # Fabricamos el APK ignorando el error de Null Safety
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Instalador-APK
          path: build/app/outputs/flutter-apk/app-release.apk
