name: Build Alchemy APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'

      - name: 4. Construccion Limpia del APK
        run: |
          # Borramos CUALQUIER rastro de configuraciones fallidas
          rm -f pubspec.lock
          flutter clean
          
          # Descargamos las librerías desde cero (Usa la version ^0.5.0 de internet)
          flutter pub get
          
          # Fabricamos el instalador final
          flutter build apk --release --no-tree-shake-icons

      - name: 5. Descargar mi APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
